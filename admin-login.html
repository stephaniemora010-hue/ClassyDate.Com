<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Admin Login | ClassyDate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0D0B1A;
            color: #FAF8F5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 48px 36px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-container .icon {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
        }

        .login-container h1 {
            font-family: 'Georgia', serif;
            font-size: 26px;
            color: #FAF8F5;
            margin-bottom: 4px;
        }

        .login-container p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .login-container input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #FAF8F5;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            margin-bottom: 16px;
        }

        .login-container input:focus {
            border-color: #FF2D55;
            box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.08);
        }

        .login-container input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .login-container .error-msg {
            color: #FF2D55;
            font-size: 13px;
            display: none;
            margin-bottom: 12px;
        }

        .login-container .error-msg.show {
            display: block;
        }

        .login-container .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF2D55, #FF0040);
            color: #FAF8F5;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .login-container .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 45, 85, 0.35);
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #FF2D55;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px 28px;
            }
            .login-container h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <span class="icon">🔒</span>
        <h1>Admin Access</h1>
        <p>Enter the password to manage members</p>
        <div class="error-msg" id="error-msg">⚠️ Incorrect password. Please try again.</div>
        <input type="password" id="admin-password" placeholder="Enter admin password..." onkeydown="if(event.key==='Enter') login()">
        <button class="btn-login" id="login-btn">Log In</button>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        // 🔑 CHANGE THIS PASSWORD TO YOUR OWN SECURE PASSWORD
        const ADMIN_PASSWORD = "ClassyAdmin2026";

        const passwordInput = document.getElementById('admin-password');
        const errorMsg = document.getElementById('error-msg');
        const loginBtn = document.getElementById('login-btn');

        function login() {
            const input = passwordInput.value;

            if (input === ADMIN_PASSWORD) {
                // Correct password - redirect to admin dashboard
                localStorage.setItem('admin_session', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                errorMsg.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
                loginBtn.textContent = '⚠️ Try Again';
                setTimeout(() => {
                    loginBtn.textContent = 'Log In';
                }, 2000);
            }
        }

        loginBtn.addEventListener('click', login);

        console.log('🔒 Admin Login Page loaded');
        console.log('🔑 Default password: ClassyAdmin2026 (CHANGE THIS!)');
    </script>

</body>
</html>
