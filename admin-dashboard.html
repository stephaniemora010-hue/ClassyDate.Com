<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Admin | ClassyDate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
    <style>
        /* ============================================================
           CLASSYDATE - Admin Dashboard (COMPRESSED)
           ============================================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0D0B1A;
            color: #FAF8F5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ---------- HEADER (COMPRESSED) ---------- */
        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(13, 11, 26, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 45, 85, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 12px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Georgia', serif;
            font-size: 17px;
            font-weight: 700;
            color: #FF2D55;
        }
        .cb-shell-brand span {
            color: #FAF8F5;
            font-weight: 300;
        }
        .cb-shell-brand .icon {
            font-size: 22px;
        }

        .cb-shell-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cb-shell-button {
            padding: 5px 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        .cb-shell-button--secondary {
            background: rgba(255, 45, 85, 0.1);
            color: #FF2D55;
            border: 1px solid rgba(255, 45, 85, 0.12);
        }
        .cb-shell-button--secondary:hover {
            background: rgba(255, 45, 85, 0.18);
        }
        .cb-shell-button--primary {
            background: #FF2D55;
            color: #0D0B1A;
        }
        .cb-shell-button--primary:hover {
            background: #FF0040;
            transform: translateY(-2px);
        }

        /* ---------- ADMIN WRAPPER (COMPRESSED) ---------- */
        .admin-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 65px 16px 30px;
        }

        /* ---------- HEADER SECTION (COMPRESSED) ---------- */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .admin-header h1 {
            font-family: 'Georgia', serif;
            font-size: 22px;
            color: #FAF8F5;
        }
        .admin-header h1 span {
            color: #FF2D55;
        }

        .admin-header .badge-admin {
            background: rgba(255, 45, 85, 0.12);
            color: #FF2D55;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
        }

        .admin-header .btn-logout {
            padding: 5px 16px;
            background: rgba(255, 45, 85, 0.08);
            color: #FF2D55;
            border: 1px solid rgba(255, 45, 85, 0.08);
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .admin-header .btn-logout:hover {
            background: rgba(255, 45, 85, 0.15);
        }

        .admin-header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ---------- STATS GRID (COMPRESSED) ---------- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card-admin {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .stat-card-admin:hover {
            border-color: rgba(255, 45, 85, 0.1);
        }

        .stat-card-admin .stat-number {
            font-size: 22px;
            font-weight: 700;
            color: #FF2D55;
            font-family: 'Georgia', serif;
        }

        .stat-card-admin .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 1px;
        }

        .stat-card-admin .stat-icon {
            font-size: 16px;
            float: right;
            opacity: 0.3;
        }

        /* ---------- TOOLBAR (COMPRESSED) ---------- */
        .admin-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .admin-toolbar-left {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .admin-toolbar-left input,
        .admin-toolbar-left select {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            color: #FAF8F5;
            font-size: 12px;
            font-family: inherit;
            outline: none;
        }

        .admin-toolbar-left input:focus,
        .admin-toolbar-left select:focus {
            border-color: #FF2D55;
        }

        .admin-toolbar-left input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .admin-toolbar-left select option {
            background: #1A1A2E;
            color: #FAF8F5;
        }

        .admin-toolbar-right {
            display: flex;
            gap: 6px;
        }

        .btn-admin {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-admin--add {
            background: linear-gradient(135deg, #FF2D55, #FF0040);
            color: #FAF8F5;
        }
        .btn-admin--add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 45, 85, 0.3);
        }

        .btn-admin--export {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-admin--export:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-admin--edit {
            background: rgba(255, 215, 0, 0.08);
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.08);
            padding: 3px 8px;
            font-size: 10px;
        }
        .btn-admin--edit:hover {
            background: rgba(255, 215, 0, 0.15);
        }

        .btn-admin--delete {
            background: rgba(255, 45, 85, 0.08);
            color: #FF2D55;
            border: 1px solid rgba(255, 45, 85, 0.08);
            padding: 3px 8px;
            font-size: 10px;
        }
        .btn-admin--delete:hover {
            background: rgba(255, 45, 85, 0.2);
        }

        /* ---------- TABLE (COMPRESSED) ---------- */
        .admin-table-wrapper {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .admin-table th {
            padding: 8px 10px;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .admin-table td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.7);
            vertical-align: middle;
        }

        .admin-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .admin-table .member-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-table .member-cell img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            background: #1A1A2E;
        }

        .admin-table .member-cell .name {
            color: #FAF8F5;
            font-weight: 500;
            font-size: 13px;
        }

        .admin-table .member-cell .email {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
        }

        .badge-small {
            padding: 1px 8px;
            border-radius: 50px;
            font-size: 9px;
            font-weight: 600;
        }

        .badge-small--verified {
            background: rgba(0, 200, 81, 0.15);
            color: #00C851;
        }

        .badge-small--premium {
            background: rgba(255, 215, 0, 0.12);
            color: #FFD700;
        }

        .badge-small--pending {
            background: rgba(255, 165, 0, 0.12);
            color: #FFA500;
        }

        .actions-cell {
            display: flex;
            gap: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.3);
        }

        .empty-state .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .empty-state h3 {
            color: #FAF8F5;
            font-size: 16px;
            margin-bottom: 2px;
        }

        /* ---------- MODAL (COMPRESSED) ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1A1A2E;
            border-radius: 14px;
            max-width: 480px;
            width: 100%;
            padding: 24px 24px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-family: 'Georgia', serif;
            font-size: 20px;
            color: #FAF8F5;
            margin-bottom: 2px;
        }

        .modal .modal-subtitle {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-bottom: 14px;
        }

        .modal .form-group {
            margin-bottom: 10px;
        }

        .modal .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2px;
        }

        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            color: #FAF8F5;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .modal .form-group input:focus,
        .modal .form-group select:focus,
        .modal .form-group textarea:focus {
            border-color: #FF2D55;
            background: rgba(255, 45, 85, 0.04);
        }

        .modal .form-group textarea {
            resize: vertical;
            min-height: 50px;
        }

        .modal .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .modal .modal-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .modal .btn-modal-save {
            background: linear-gradient(135deg, #FF2D55, #FF0040);
            color: #FAF8F5;
        }
        .modal .btn-modal-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 45, 85, 0.3);
        }

        .modal .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .modal .btn-modal-cancel:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* ---------- TOAST ---------- */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 10px;
            background: #1A1A2E;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            font-size: 13px;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 350px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: rgba(0, 200, 81, 0.2);
        }
        .toast.error {
            border-color: rgba(255, 45, 85, 0.2);
        }
        .toast .toast-icon {
            margin-right: 6px;
        }

        /* ---------- PAGINATION ---------- */
        .admin-pagination {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .admin-pagination button {
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 12px;
        }

        .admin-pagination button:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .admin-pagination button.active {
            background: rgba(255, 45, 85, 0.12);
            color: #FF2D55;
            border-color: rgba(255, 45, 85, 0.15);
        }

        /* ---------- LOADING ---------- */
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.3);
        }

        .loading-spinner.active {
            display: block;
        }

        .loading-spinner .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 45, 85, 0.1);
            border-top: 3px solid #FF2D55;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .cb-shell-header__inner {
                height: 44px;
                padding: 0 10px;
            }
            .cb-shell-brand {
                font-size: 15px;
            }
            .cb-shell-brand .icon {
                font-size: 20px;
            }

            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .admin-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .admin-toolbar-left {
                flex-direction: column;
                width: 100%;
            }

            .admin-toolbar-left input,
            .admin-toolbar-left select {
                width: 100%;
            }

            .admin-toolbar-right {
                width: 100%;
            }

            .admin-toolbar-right .btn-admin {
                flex: 1;
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .modal .form-row {
                grid-template-columns: 1fr;
            }

            .admin-wrapper {
                padding: 58px 10px 20px;
            }

            .admin-table {
                font-size: 11px;
            }
            .admin-table th,
            .admin-table td {
                padding: 5px 8px;
            }
            .admin-table .member-cell img {
                width: 24px;
                height: 24px;
            }
            .admin-table .member-cell .name {
                font-size: 12px;
            }

            .modal {
                padding: 18px 16px 16px;
                max-width: 100%;
                margin: 10px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .actions-cell {
                flex-direction: column;
                gap: 2px;
            }

            .actions-cell .btn-admin {
                width: 100%;
                justify-content: center;
                font-size: 10px;
                padding: 3px 8px;
            }

            .modal .modal-actions {
                flex-direction: column;
            }

            .admin-header h1 {
                font-size: 18px;
            }

            .admin-table {
                font-size: 10px;
            }
            .admin-table th,
            .admin-table td {
                padding: 4px 6px;
            }

            .badge-small {
                font-size: 8px;
                padding: 1px 6px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- HEADER                                                       -->
    <!-- ============================================================ -->
    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="index.html" aria-label="ClassyDate">
                <span class="icon">💎</span>
                Classy<span>Date</span>
            </a>

            <div class="cb-shell-actions">
                <a href="members.html" class="cb-shell-button cb-shell-button--secondary">Members</a>
                <a href="admin-login.html" class="cb-shell-button cb-shell-button--primary">Admin</a>
                <a href="login.html" class="cb-shell-button cb-shell-button--secondary">Log out</a>
            </div>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- ADMIN DASHBOARD                                              -->
    <!-- ============================================================ -->
    <main class="admin-wrapper">
        <!-- Header -->
        <div class="admin-header">
            <div>
                <h1>Admin <span>Dashboard</span></h1>
                <span class="badge-admin">🔒 Admin Access</span>
            </div>
            <div class="admin-header-right">
                <button class="btn-admin btn-admin--add" onclick="openAddModal()">➕ Add</button>
                <button class="btn-logout" onclick="logoutAdmin()">🚪 Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card-admin">
                <span class="stat-icon">👥</span>
                <div class="stat-number" id="total-members">0</div>
                <div class="stat-label">Total Members</div>
            </div>
            <div class="stat-card-admin">
                <span class="stat-icon">🟢</span>
                <div class="stat-number" id="online-members">0</div>
                <div class="stat-label">Online Now</div>
            </div>
            <div class="stat-card-admin">
                <span class="stat-icon">✅</span>
                <div class="stat-number" id="verified-members">0</div>
                <div class="stat-label">Verified</div>
            </div>
            <div class="stat-card-admin">
                <span class="stat-icon">🆕</span>
                <div class="stat-number" id="new-members">0</div>
                <div class="stat-label">New This Month</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="admin-toolbar">
            <div class="admin-toolbar-left">
                <input type="text" id="search-input" placeholder="🔍 Search..." oninput="applyFilters()">
                <select id="filter-status" onchange="applyFilters()">
                    <option value="all">All Status</option>
                    <option value="online">Online</option>
                    <option value="offline">Offline</option>
                </select>
                <select id="filter-verified" onchange="applyFilters()">
                    <option value="all">All</option>
                    <option value="verified">Verified</option>
                    <option value="unverified">Unverified</option>
                </select>
            </div>
            <div class="admin-toolbar-right">
                <button class="btn-admin btn-admin--export" onclick="exportData()">📥 Export</button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loading-spinner" id="loading-spinner">
            <div class="spinner"></div>
            <span>Loading...</span>
        </div>

        <!-- Members Table -->
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Member</th>
                        <th>Gender</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Verified</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <!-- Rows rendered by JavaScript -->
                </tbody>
            </table>
            <div class="admin-pagination" id="admin-pagination"></div>
        </div>
    </main>

    <!-- ============================================================ -->
    <!-- MODAL - Add/Edit Member                                     -->
    <!-- ============================================================ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Add Member</h2>
            <p class="modal-subtitle" id="modal-subtitle">Fill in the details below.</p>

            <form id="member-form" onsubmit="saveMember(event)">
                <input type="hidden" id="edit-id" value="">

                <div class="form-group">
                    <label for="form-name">Full Name *</label>
                    <input type="text" id="form-name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="form-email">Email *</label>
                    <input type="email" id="form-email" placeholder="john@example.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="form-age">Age *</label>
                        <input type="number" id="form-age" placeholder="25" min="18" max="99" required>
                    </div>
                    <div class="form-group">
                        <label for="form-gender">Gender *</label>
                        <select id="form-gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="form-location">Location</label>
                    <input type="text" id="form-location" placeholder="New York, USA">
                </div>

                <div class="form-group">
                    <label for="form-bio">Bio</label>
                    <textarea id="form-bio" placeholder="Short bio..."></textarea>
                </div>

                <div class="form-group">
                    <label for="form-photo">Photo URL</label>
                    <input type="text" id="form-photo" placeholder="https://randomuser.me/api/portraits/...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="form-verified">Verified</label>
                        <select id="form-verified">
                            <option value="true">✅ Yes</option>
                            <option value="false" selected>❌ No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="form-premium">Premium</label>
                        <select id="form-premium">
                            <option value="true">⭐ Yes</option>
                            <option value="false" selected>❌ No</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="form-interests">Interests (comma separated)</label>
                    <input type="text" id="form-interests" placeholder="Travel, Coffee, Music">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-modal-save" id="modal-save-btn">💾 Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- TOAST                                                       -->
    <!-- ============================================================ -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toast-icon">✅</span>
        <span id="toast-message">Saved!</span>
    </div>

    <!-- ============================================================ -->
    <!-- SUPABASE + ADMIN SCRIPTS                                    -->
    <!-- ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <script>
        // ============================================================
        // CHECK ADMIN SESSION
        // ============================================================
        (function checkSession() {
            const session = localStorage.getItem('admin_session');
            if (session !== 'true') {
                window.location.href = 'admin-login.html';
                return;
            }
        })();

        // ============================================================
        // SUPABASE CONFIGURATION
        // ============================================================
        const SUPABASE_URL = 'https://soyypmuksvxyjeeemquz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vUvF8Ghbb1yB0yQKCCuHiA_wtkRYj1b';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // STATE
        // ============================================================
        let members = [];
        let filteredMembers = [];
        let currentPage = 1;
        const perPage = 5;

        // ============================================================
        // FETCH MEMBERS
        // ============================================================
        async function fetchMembers() {
            const spinner = document.getElementById('loading-spinner');
            spinner.classList.add('active');

            try {
                const { data, error } = await supabase
                    .from('members')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                members = data || [];
                filteredMembers = [...members];
                updateStats();
                renderTable();
                renderPagination();
            } catch (error) {
                console.error('Error:', error);
                showToast('⚠️ Error loading members', 'error');
            } finally {
                spinner.classList.remove('active');
            }
        }

        // ============================================================
        // CRUD OPERATIONS
        // ============================================================
        async function saveMember(event) {
            event.preventDefault();

            const formData = {
                name: document.getElementById('form-name').value.trim(),
                email: document.getElementById('form-email').value.trim(),
                age: parseInt(document.getElementById('form-age').value),
                gender: document.getElementById('form-gender').value,
                location: document.getElementById('form-location').value.trim(),
                bio: document.getElementById('form-bio').value.trim(),
                photo_url: document.getElementById('form-photo').value.trim(),
                verified: document.getElementById('form-verified').value === 'true',
                premium: document.getElementById('form-premium').value === 'true',
                interests: document.getElementById('form-interests').value.split(',').map(s => s.trim()).filter(Boolean),
                online: false,
                is_new: true,
                joined: new Date().toISOString().split('T')[0]
            };

            if (!formData.name || !formData.email || !formData.age || !formData.gender) {
                showToast('⚠️ Fill in all required fields', 'error');
                return;
            }

            const editId = document.getElementById('edit-id').value;

            try {
                if (editId) {
                    const { data, error } = await supabase
                        .from('members')
                        .update({
                            name: formData.name,
                            email: formData.email,
                            age: formData.age,
                            gender: formData.gender,
                            location: formData.location || '',
                            bio: formData.bio || '',
                            photo_url: formData.photo_url || '',
                            verified: formData.verified,
                            premium: formData.premium,
                            interests: formData.interests || [],
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', parseInt(editId))
                        .select();

                    if (error) throw error;
                    showToast(`✅ ${formData.name} updated!`, 'success');
                } else {
                    const { data, error } = await supabase
                        .from('members')
                        .insert([formData])
                        .select();

                    if (error) throw error;
                    showToast(`✅ ${formData.name} added!`, 'success');
                }

                closeModal();
                await fetchMembers();
            } catch (error) {
                console.error('Error:', error);
                showToast('⚠️ Error: ' + error.message, 'error');
            }
        }

        async function deleteMember(id) {
            const member = members.find(m => m.id === id);
            if (!member) return;

            if (!confirm(`Delete ${member.name}?`)) return;

            try {
                const { error } = await supabase
                    .from('members')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showToast(`🗑️ ${member.name} deleted`, 'success');
                await fetchMembers();
            } catch (error) {
                console.error('Error:', error);
                showToast('⚠️ Error deleting member', 'error');
            }
        }

        // ============================================================
        // STATS
        // ============================================================
        function updateStats() {
            const total = members.length;
            const online = members.filter(m => m.online).length;
            const verified = members.filter(m => m.verified).length;
            const now = new Date();
            const thisMonth = now.getMonth();
            const thisYear = now.getFullYear();
            const newThisMonth = members.filter(m => {
                if (!m.joined) return false;
                const joined = new Date(m.joined);
                return joined.getMonth() === thisMonth && joined.getFullYear() === thisYear;
            }).length;

            document.getElementById('total-members').textContent = total;
            document.getElementById('online-members').textContent = online;
            document.getElementById('verified-members').textContent = verified;
            document.getElementById('new-members').textContent = newThisMonth;
        }

        // ============================================================
        // FILTERS
        // ============================================================
        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            const statusFilter = document.getElementById('filter-status').value;
            const verifiedFilter = document.getElementById('filter-verified').value;

            filteredMembers = members.filter(m => {
                const matchSearch = m.name.toLowerCase().includes(search) ||
                    m.email.toLowerCase().includes(search) ||
                    (m.location || '').toLowerCase().includes(search);
                const matchStatus = statusFilter === 'all' ||
                    (statusFilter === 'online' && m.online) ||
                    (statusFilter === 'offline' && !m.online);
                const matchVerified = verifiedFilter === 'all' ||
                    (verifiedFilter === 'verified' && m.verified) ||
                    (verifiedFilter === 'unverified' && !m.verified);
                return matchSearch && matchStatus && matchVerified;
            });

            currentPage = 1;
            renderTable();
            renderPagination();
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================
        function renderTable() {
            const tbody = document.getElementById('admin-table-body');
            const start = (currentPage - 1) * perPage;
            const pageMembers = filteredMembers.slice(start, start + perPage);

            if (pageMembers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <div class="icon">👤</div>
                                <h3>No members</h3>
                                <p>Add a new member to get started.</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = pageMembers.map(m => `
                <tr>
                    <td>
                        <div class="member-cell">
                            <img src="${m.photo_url || 'https://randomuser.me/api/portraits/lego/1.jpg'}" alt="${m.name}" loading="lazy" onerror="this.src='https://randomuser.me/api/portraits/lego/1.jpg'">
                            <div>
                                <div class="name">${m.name}</div>
                                <div class="email">${m.email || 'No email'}</div>
                            </div>
                        </div>
                    </td>
                    <td>${m.gender === 'male' ? '👨 Male' : '👩 Female'}</td>
                    <td>${m.location || '—'}</td>
                    <td>
                        <span style="display:flex;align-items:center;gap:4px;">
                            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${m.online ? '#00C851' : 'rgba(255,255,255,0.2)'};"></span>
                            ${m.online ? 'Online' : 'Offline'}
                        </span>
                    </td>
                    <td>
                        ${m.verified
                            ? '<span class="badge-small badge-small--verified">✓ Verified</span>'
                            : '<span class="badge-small badge-small--pending">⏳ Pending</span>'
                        }
                        ${m.premium ? '<span class="badge-small badge-small--premium">⭐ Premium</span>' : ''}
                    </td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn-admin btn-admin--edit" onclick="openEditModal(${m.id})">✏️</button>
                            <button class="btn-admin btn-admin--delete" onclick="deleteMember(${m.id})">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ============================================================
        // PAGINATION
        // ============================================================
        function renderPagination() {
            const container = document.getElementById('admin-pagination');
            const totalPages = Math.ceil(filteredMembers.length / perPage);

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}>‹</button>`;

            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            if (totalPages > 5) {
                html += `<span style="color:rgba(255,255,255,0.15);">…</span>`;
                html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}>›</button>`;
            container.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredMembers.length / perPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            renderPagination();
        }

        // ============================================================
        // MODAL
        // ============================================================
        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add Member';
            document.getElementById('modal-subtitle').textContent = 'Fill in the details below.';
            document.getElementById('modal-save-btn').textContent = '💾 Save';
            document.getElementById('member-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-overlay').classList.add('active');
        }

        function openEditModal(id) {
            const member = members.find(m => m.id === id);
            if (!member) return;

            document.getElementById('modal-title').textContent = 'Edit Member';
            document.getElementById('modal-subtitle').textContent = 'Update the details below.';
            document.getElementById('modal-save-btn').textContent = '💾 Update';

            document.getElementById('edit-id').value = id;
            document.getElementById('form-name').value = member.name || '';
            document.getElementById('form-email').value = member.email || '';
            document.getElementById('form-age').value = member.age || '';
            document.getElementById('form-gender').value = member.gender || '';
            document.getElementById('form-location').value = member.location || '';
            document.getElementById('form-bio').value = member.bio || '';
            document.getElementById('form-photo').value = member.photo_url || '';
            document.getElementById('form-verified').value = member.verified ? 'true' : 'false';
            document.getElementById('form-premium').value = member.premium ? 'true' : 'false';
            document.getElementById('form-interests').value = (member.interests || []).join(', ');

            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================================
        // LOGOUT
        // ============================================================
        function logoutAdmin() {
            localStorage.removeItem('admin_session');
            window.location.href = 'admin-login.html';
        }

        // ============================================================
        // EXPORT
        // ============================================================
        function exportData() {
            const dataStr = JSON.stringify(members, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `members_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 Exported!', 'success');
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimeout;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');

            toast.className = 'toast ' + type;
            icon.textContent = type === 'success' ? '✅' : '⚠️';
            msg.textContent = message;

            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // AUTO FILTER
        // ============================================================
        document.getElementById('search-input').addEventListener('input', applyFilters);

        // ============================================================
        // INIT
        // ============================================================
        fetchMembers();
        console.log('💎 Admin Dashboard loaded');
    </script>
</body>
</html>
